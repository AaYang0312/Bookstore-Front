name: bookstore

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: bookstore
      TZ: Asia/Shanghai
    volumes:
      - bookstore-mysql-data:/var/lib/mysql
      - ../Bookstore_Backend/sql/bookstore.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../Bookstore_Backend/sql/mock.sql:/docker-entrypoint-initdb.d/02-mock.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - bookstore-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  bookstore-backend:
    build:
      context: ../Bookstore_Backend
    environment:
      BOOKSTORE_SERVER_HOST: 0.0.0.0
      BOOKSTORE_SERVER_PORT: 8080
      BOOKSTORE_DATABASE_HOST: mysql
      BOOKSTORE_DATABASE_PORT: 3306
      BOOKSTORE_DATABASE_USER: root
      BOOKSTORE_DATABASE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      BOOKSTORE_DATABASE_NAME: bookstore
      BOOKSTORE_REDIS_HOST: redis
      BOOKSTORE_REDIS_PORT: 6379
      BOOKSTORE_REDIS_DB: 0
      TZ: Asia/Shanghai
    ports:
      - "${BACKEND_BIND_HOST:-127.0.0.1}:${BACKEND_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  bookstore-agent:
    build:
      context: ../bookstore-agent
    environment:
      MODEL_NAME: ${MODEL_NAME:-gpt-4o-mini}
      MODEL_BASE_URL: ${MODEL_BASE_URL:-https://api.openai.com/v1}
      MODEL_API_KEY: ${MODEL_API_KEY:-sk-change-me}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-tvly-change-me}
      BOOKSTORE_API_BASE_URL: http://bookstore-backend:8080/api/v1
      BOOKSTORE_ADMIN_BASE_URL: http://bookstore-backend:8080/api/v1/admin
    ports:
      - "${AGENT_BIND_HOST:-127.0.0.1}:${AGENT_PORT:-8000}:8000"
    depends_on:
      bookstore-backend:
        condition: service_healthy
    restart: unless-stopped

  bookstore-frontend:
    build:
      context: .
      args:
        REACT_APP_API_BASE_URL: /api/v1
        REACT_APP_AGENT_API_URL: /api/v1/agent/chat
        REACT_APP_ADMIN_DEMO_MODE: ${REACT_APP_ADMIN_DEMO_MODE:-false}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      bookstore-backend:
        condition: service_healthy
      bookstore-agent:
        condition: service_healthy
    restart: unless-stopped

volumes:
  bookstore-mysql-data:
  bookstore-redis-data:
