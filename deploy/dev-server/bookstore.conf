server {
    listen 80;
    listen [::]:80;
    server_name 47.120.34.148;

    root /var/www;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    location ^~ /bookstore-api/v1/agent/ {
        rewrite ^/bookstore-api(/.*)$ /api$1 break;
        proxy_pass http://127.0.0.1:18000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location ^~ /bookstore-api/ {
        rewrite ^/bookstore-api(/.*)$ /api$1 break;
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    location = /bookstore {
        return 301 /bookstore/;
    }

    location ^~ /bookstore/ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri $uri/ /bookstore/index.html;
    }

    location = /bookstore-health {
        access_log off;
        default_type text/plain;
        return 200 "bookstore frontend healthy\n";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
